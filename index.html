        <h2 style={{fontFamily:"Cinzel",fontSize:20,color:"var(--gold)",marginBottom:6,letterSpacing:"0.08em"}}>⚔ Blood Seeker</h2>
        <h3 style={{fontFamily:"Cinzel",fontSize:14,color:"var(--ink2)",marginBottom:20,letterSpacing:"0.06em",fontWeight:400}}>Cloud Sync Setup</h3>

        <div style={{background:"var(--parch2)",border:"1px solid var(--border)",borderRadius:6,padding:16,marginBottom:24,fontSize:13,color:"var(--ink2)",lineHeight:1.8}}>
          <strong style={{fontFamily:"Cinzel",fontSize:11,color:"var(--ink)",letterSpacing:"0.06em"}}>ONE-TIME SETUP — 3 STEPS:</strong><br/>
          <strong>1.</strong> Go to <a href="https://supabase.com" target="_blank" style={{color:"var(--gold)"}}>supabase.com</a> → <em>Start your project</em> (free, no card needed)<br/>
          <strong>2.</strong> Once your project is created, run this SQL in the <strong>SQL Editor</strong>:<br/>
          <code style={{display:"block",background:"var(--parch3)",border:"1px solid var(--border2)",borderRadius:4,padding:"8px 12px",margin:"8px 0",fontSize:12,fontFamily:"monospace",lineHeight:1.6,userSelect:"all"}}>
            create table if not exists campaign (<br/>
            &nbsp;&nbsp;id text primary key,<br/>
            &nbsp;&nbsp;data jsonb,<br/>
            &nbsp;&nbsp;updated_at timestamptz default now()<br/>
            );<br/>
            alter table campaign enable row level security;<br/>
            create policy "allow all" on campaign for all using (true) with check (true);
          </code>
          <strong>3.</strong> Go to <strong>Settings → API Keys</strong>, copy your <em>Project URL</em> (from Settings → General) and the <em>Publishable key</em> (<code>sb_publishable_...</code>) below.
        </div>

        <label style={{fontSize:10,fontFamily:"Cinzel",color:"var(--ink3)",letterSpacing:"0.06em",display:"block",marginBottom:4}}>PROJECT URL</label>
        <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxxxxxxxxxx.supabase.co" style={iStyle}/>

        <label style={{fontSize:10,fontFamily:"Cinzel",color:"var(--ink3)",letterSpacing:"0.06em",display:"block",marginBottom:4}}>PUBLISHABLE KEY (sb_publishable_...)</label>
        <input value={key} onChange={e=>setKey(e.target.value)} placeholder="sb_publishable_..." style={{...iStyle,fontFamily:"monospace",fontSize:11}}/>

        {err&&<div style={{color:"var(--red2)",fontSize:13,marginBottom:12,padding:"6px 10px",background:"rgba(192,57,43,0.1)",border:"1px solid var(--red)",borderRadius:4}}>{err}</div>}

        <button onClick={test} disabled={testing} style={{fontFamily:"Cinzel",background:"var(--gold2)",color:"var(--dark)",border:"none",borderRadius:5,padding:"10px 24px",fontSize:13,cursor:testing?"wait":"pointer",width:"100%",letterSpacing:"0.06em",opacity:testing?0.7:1}}>
          {testing?"Testing connection...":"Connect & Save →"}
        </button>
        <p style={{fontSize:11,color:"var(--ink3)",marginTop:12,textAlign:"center",lineHeight:1.6}}>
          Your data is stored in your own private Supabase project.<br/>Anthropic has no access to it.
        </p>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════
   ROOT APP
════════════════════════════════════════════════════ */
function App(){
  const [sbCfg,setSbCfg]=useState(()=>{
    const c=getSBConfig();
    if(c){initSB(c.url,c.key);return c;}
    return null;
  });
  const [data,setData]=useState(null); // null = loading
  const [syncStatus,setSyncStatus]=useState("idle"); // idle | syncing | saved | error
  const [page,setPage]=useState("map");
  const [charIdx,setCharIdx]=useState(0);
  const [sideOpen,setSideOpen]=useState(false);
  const [loreSel,setLoreSel]=useState(null);

  // Merge loaded cloud data with defaults
  const mergeData=useCallback(raw=>{
    const s=raw||{};
    const lore={...DS.lore};
    if(s.lore)Object.keys(DS.lore).forEach(k=>{lore[k]=(s.lore[k]||[]).map(e=>({...EMPTY_LORE(),...e}));});
    const characters=(s.characters||DS.characters).map((c,i)=>({...DC(i+1),...c,statRows:c.statRows||(DC(i+1).statRows)}));
    return{...DS,...s,lore,characters};
  },[]);

  // Load data on startup / when config arrives
  useEffect(()=>{
    if(!sbCfg){setData(mergeData(load()));return;}
    const sb=getSB();
    setSyncStatus("syncing");
    dbLoad(sb).then(raw=>{
      if(raw){setData(mergeData(raw));}
      else{
        // Nothing in cloud yet — push local data up
        const local=load();
        const merged=mergeData(local);
        setData(merged);
        dbSave(sb,merged);
      }
      setSyncStatus("saved");
    }).catch(()=>{
      setData(mergeData(load()));
      setSyncStatus("error");
    });
  },[sbCfg]);

  // Save only when user clicks Save — always persist locally immediately for safety
  useEffect(()=>{
    if(!data)return;
    persist(data); // always keep local copy up to date silently
  },[data]);

  const manualSave=useCallback(async()=>{
    if(!data)return;
    setSyncStatus("syncing");
    // Always save locally first so nothing is ever lost
    persist(data);
    if(sbCfg){
      const sb=getSB();
      try{
        // Step 1: fetch what's currently in the cloud
        const cloudRaw=await dbLoad(sb);
        let toSave=data;
        if(cloudRaw){
          // Step 2: smart merge — for each top-level section, use whichever
          // version was more recently touched by comparing array lengths and content.
          // Rule: for each character and each lore section array, keep the union —
          // items edited locally replace their cloud counterpart (matched by id),
          // items only in cloud are kept, items only local are added.
          const merged={...cloudRaw};

          // Merge characters: local version wins per character (user is actively editing)
          merged.characters=(data.characters||[]).map((localChar,i)=>{
            const cloudChar=(cloudRaw.characters||[])[i];
            if(!cloudChar)return localChar;
            // Keep local char but preserve any cloud fields not present locally
            return {...cloudChar,...localChar};
          });
          // If cloud has more characters than local, keep them
          if((cloudRaw.characters||[]).length>(data.characters||[]).length){
            const extra=cloudRaw.characters.slice(data.characters.length);
            merged.characters=[...merged.characters,...extra];
          }

          // Merge each lore section by id
          const loreSections=["allies","enemies","factions","settlements","history","sessions"];
          merged.lore={...cloudRaw.lore};
          loreSections.forEach(section=>{
            const localItems=data.lore?.[section]||[];
            const cloudItems=cloudRaw.lore?.[section]||[];
            // Build a map of cloud items by id
            const cloudMap={};
            cloudItems.forEach(item=>{cloudMap[item.id]=item;});
            // Build a map of local items by id
            const localMap={};
            localItems.forEach(item=>{localMap[item.id]=item;});
            // Union: start with cloud, override with local where ids match, add new local items
            const allIds=new Set([...cloudItems.map(i=>i.id),...localItems.map(i=>i.id)]);
            merged.lore[section]=[...allIds].map(id=>{
              if(localMap[id]&&cloudMap[id]){
                // Both have it — local wins (user is actively editing)
                return {...cloudMap[id],...localMap[id]};
              }
              return localMap[id]||cloudMap[id];
            });
          });

          // Merge map items the same way
          const localMapItems=data.mapItems||[];
          const cloudMapItems=cloudRaw.mapItems||[];
          const mapCloudById={};
          cloudMapItems.forEach(i=>{mapCloudById[i.id]=i;});
          const mapLocalById={};
          localMapItems.forEach(i=>{mapLocalById[i.id]=i;});
          const allMapIds=new Set([...cloudMapItems.map(i=>i.id),...localMapItems.map(i=>i.id)]);
          merged.mapItems=[...allMapIds].map(id=>mapLocalById[id]||mapCloudById[id]);

          // Map image: use whichever is non-null, prefer local if both set
          merged.mapImage=data.mapImage||cloudRaw.mapImage||null;

          toSave=merged;
        }

        // Step 3: push merged result to cloud and update local state
        await dbSave(sb,toSave);
        persist(toSave);
        setData(toSave);
        setSyncStatus("saved");
        setTimeout(()=>setSyncStatus("idle"),2000);
      }catch(e){
        console.error("Save error:",e);
        setSyncStatus("error");
      }
    } else {
      setSyncStatus("saved");
      setTimeout(()=>setSyncStatus("idle"),1500);
    }
  },[data,sbCfg,mergeData]);

  // Pull latest from cloud (so you don't overwrite another device's work)
  const pullLatest=useCallback(async()=>{
    if(!sbCfg)return;
    setSyncStatus("syncing");
    const sb=getSB();
    try{
      const raw=await dbLoad(sb);
      if(raw){
        setData(mergeData(raw));
        persist(raw);
        setSyncStatus("saved");
        setTimeout(()=>setSyncStatus("idle"),2000);
      }
    }catch{setSyncStatus("error");}
  },[sbCfg,mergeData]);

  const setMapItems=useCallback(fn=>setData(d=>({...d,mapItems:typeof fn==="function"?fn(d.mapItems):fn})),[]);
  const setLore=useCallback(fn=>setData(d=>({...d,lore:typeof fn==="function"?fn(d.lore):fn})),[]);
  const updateChar=useCallback((idx,ch)=>setData(d=>{const cs=[...d.characters];cs[idx]=ch;return{...d,characters:cs};}),[]);
  const navigateToLore=(section,id)=>{setLoreSel({s:section,id});setPage("lore");};

  // ── Colour scheme ──
  const THEMES={
    default:{name:"Blood Seeker (Default)",dark:"#1a1208",dark2:"#2a1e0a",parch:"#f5ede0",parch2:"#efe4ce",parch3:"#e8d9b8",parch4:"#ddc99a",gold:"#9a7020",gold2:"#c49a30",gold3:"#e8c860",ink:"#2c1a06",ink2:"#5a3e1b",ink3:"#8a6a3a",sheetHead:"#2a2a3a",sheetBorder:"#b8a070",sheetBg:"#f0ebe0"},
    midnight:{name:"Midnight Blue",dark:"#0a0d1a",dark2:"#111828",parch:"#e8eaf6",parch2:"#dde0f0",parch3:"#cdd2e8",parch4:"#b8bfdb",gold:"#5c6bc0",gold2:"#7986cb",gold3:"#9fa8da",ink:"#1a1f3a",ink2:"#2d3561",ink3:"#5c6490",sheetHead:"#1a237e",sheetBorder:"#7986cb",sheetBg:"#eef0fb"},
    forest:{name:"Emerald Forest",dark:"#0a160a",dark2:"#0f2010",parch:"#edf5ec",parch2:"#dceeda",parch3:"#c9e3c6",parch4:"#b0d4ac",gold:"#2e7d32",gold2:"#43a047",gold3:"#81c784",ink:"#0d1f0d",ink2:"#1b4d1e",ink3:"#4a7c4e",sheetHead:"#1b5e20",sheetBorder:"#66bb6a",sheetBg:"#f1f8f1"},
    crimson:{name:"Crimson Court",dark:"#1a0a0a",dark2:"#2a0f0f",parch:"#f5e8e8",parch2:"#eedada",parch3:"#e4c8c8",parch4:"#d4a8a8",gold:"#b71c1c",gold2:"#e53935",gold3:"#ef9a9a",ink:"#2c0a0a",ink2:"#5a1a1a",ink3:"#8a4040",sheetHead:"#7f0000",sheetBorder:"#e57373",sheetBg:"#fdf0f0"},
    obsidian:{name:"Obsidian",dark:"#0a0a0a",dark2:"#141414",parch:"#e8e8e8",parch2:"#d8d8d8",parch3:"#c4c4c4",parch4:"#aaaaaa",gold:"#616161",gold2:"#9e9e9e",gold3:"#eeeeee",ink:"#111",ink2:"#333",ink3:"#666",sheetHead:"#212121",sheetBorder:"#757575",sheetBg:"#f5f5f5"},
  };
  const [showTheme,setShowTheme]=useState(false);
  const [themeKey,setThemeKey]=useState(()=>localStorage.getItem("bs_theme")||"default");
  const [customTheme,setCustomTheme]=useState(()=>{try{const r=localStorage.getItem("bs_custom_theme");return r?JSON.parse(r):null}catch{return null}});

  const activeTheme=themeKey==="custom"&&customTheme?customTheme:THEMES[themeKey]||THEMES.default;

  useEffect(()=>{
    const t=activeTheme;
    const r=document.documentElement.style;
    r.setProperty("--dark",t.dark);r.setProperty("--dark2",t.dark2);
    r.setProperty("--parch",t.parch);r.setProperty("--parch2",t.parch2);
    r.setProperty("--parch3",t.parch3);r.setProperty("--parch4",t.parch4);
    r.setProperty("--gold",t.gold);r.setProperty("--gold2",t.gold2);r.setProperty("--gold3",t.gold3);
    r.setProperty("--ink",t.ink);r.setProperty("--ink2",t.ink2);r.setProperty("--ink3",t.ink3);
    r.setProperty("--sheet-head",t.sheetHead);r.setProperty("--sheet-border",t.sheetBorder);r.setProperty("--sheet-bg",t.sheetBg);
    r.setProperty("--border","rgba(0,0,0,0.15)");r.setProperty("--border2","rgba(0,0,0,0.3)");
    localStorage.setItem("bs_theme",themeKey);
  },[themeKey,customTheme]);

  const handleSBSave=cfg=>{initSB(cfg.url,cfg.key);setSbCfg(cfg);};

  // Show setup screen if no config
  if(!sbCfg)return <SetupScreen onSave={handleSBSave}/>;

  // Loading state
  if(!data)return(
    <div style={{height:"100vh",background:"var(--dark)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontFamily:"Cinzel",color:"var(--gold3)",fontSize:20,letterSpacing:"0.12em"}}>⚔ Blood Seeker</div>
      <div style={{fontFamily:"Cinzel",color:"var(--ink3)",fontSize:12,letterSpacing:"0.08em"}}>Loading your campaign...</div>
      <div style={{width:40,height:40,border:"3px solid var(--border2)",borderTopColor:"var(--gold2)",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  const syncLabel={idle:"",syncing:"⟳ Syncing...",saved:"✓ Saved",error:"⚠ Sync error"}[syncStatus];
  const syncColor={idle:"transparent",syncing:"var(--gold3)",saved:"rgba(100,200,100,0.8)",error:"var(--red2)"}[syncStatus];

  return(<div style={{display:"flex",flexDirection:"column",height:"100vh",background:"var(--dark)"}}>
    <header style={{display:"flex",alignItems:"center",padding:"0 16px",height:46,borderBottom:"2px solid var(--gold2)",background:"var(--dark2)",flexShrink:0,gap:12}}>
      <h1 style={{fontSize:16,letterSpacing:"0.14em",color:"var(--gold3)",whiteSpace:"nowrap",fontFamily:"Cinzel",textShadow:"0 0 18px rgba(200,160,40,0.3)"}}>⚔ Blood Seeker</h1>
      <div style={{width:1,height:20,background:"var(--border2)"}}/>
      <nav style={{display:"flex",gap:3}}>
        {[{id:"map",label:"World Map",icon:"🗺"},{id:"lore",label:"Lore",icon:"📜"},{id:"chars",label:"Characters",icon:"⚔"}].map(n=>(
          <button key={n.id} onClick={()=>{setPage(n.id);if(n.id!=="lore")setLoreSel(null);}} className={`btn${page===n.id?" act":""}`} style={{padding:"4px 14px",fontSize:11,fontFamily:"Cinzel",letterSpacing:"0.04em"}}>
            {n.icon} {n.label}
          </button>
        ))}
      </nav>
      {page==="chars"&&<div style={{display:"flex",gap:3,marginLeft:6}}>
        {data.characters.map((c,i)=><button key={c.id} onClick={()=>setCharIdx(i)} className={`btn${charIdx===i?" act":""}`} style={{padding:"3px 11px",fontSize:11,fontFamily:"Cinzel"}}>
          {c.name||`Player ${i+1}`}
        </button>)}
      </div>}
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:10,color:syncColor,fontFamily:"Cinzel",letterSpacing:"0.06em",transition:"color 0.3s",minWidth:80,textAlign:"right"}}>{syncLabel}</span>
        <button onClick={pullLatest} title="Pull latest from cloud" style={{fontFamily:"Cinzel",cursor:"pointer",border:"1px solid var(--border2)",background:"rgba(154,112,32,0.1)",color:"var(--ink3)",borderRadius:3,padding:"3px 10px",fontSize:10,letterSpacing:"0.06em"}}>⟳ Refresh</button>
        <button onClick={manualSave} title="Save to cloud" style={{fontFamily:"Cinzel",cursor:"pointer",border:"1px solid var(--gold2)",background:"rgba(154,112,32,0.25)",color:"var(--gold3)",borderRadius:3,padding:"3px 12px",fontSize:10,letterSpacing:"0.06em",fontWeight:"bold"}}>💾 Save</button>
        <button onClick={()=>{if(confirm("Change Supabase connection settings?\nThis will reload the page.")){localStorage.removeItem(SB_KEY);window.location.reload();}}} style={{fontFamily:"Cinzel",cursor:"pointer",border:"1px solid var(--border)",background:"transparent",color:"var(--ink3)",borderRadius:3,padding:"3px 8px",fontSize:9,letterSpacing:"0.06em"}}>⚙ DB</button>
        <button onClick={()=>setShowTheme(t=>!t)} style={{fontFamily:"Cinzel",cursor:"pointer",border:"1px solid var(--border)",background:showTheme?"rgba(154,112,32,0.2)":"transparent",color:"var(--ink3)",borderRadius:3,padding:"3px 8px",fontSize:9,letterSpacing:"0.06em"}}>🎨 Theme</button>
        <button onClick={()=>{
          const json=JSON.stringify(data,null,2);
          const blob=new Blob([json],{type:"application/json"});
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");
          a.href=url;a.download="bloodseeker-backup.json";a.click();
          URL.revokeObjectURL(url);
        }} style={{fontFamily:"Cinzel",cursor:"pointer",border:"1px solid var(--border)",background:"transparent",color:"var(--ink3)",borderRadius:3,padding:"2px 8px",fontSize:9,letterSpacing:"0.06em"}}>⬇ Export</button>
        <label style={{fontFamily:"Cinzel",cursor:"pointer",border:"1px solid var(--border)",background:"transparent",color:"var(--ink3)",borderRadius:3,padding:"2px 8px",fontSize:9,letterSpacing:"0.06em"}}>⬆ Import
          <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
            const file=e.target.files?.[0];if(!file)return;
            const reader=new FileReader();
            reader.onload=ev=>{
              try{
                const parsed=JSON.parse(ev.target.result);
                if(confirm("This will replace ALL current data with the imported file. Are you sure?")){
                  setData(parsed);
                  persist(parsed);
                  if(sbCfg){const sb=getSB();dbSave(sb,parsed);}
                  alert("Import successful!");
                }
              }catch{alert("Invalid file — make sure it's a bloodseeker-backup.json file.");}
            };
            reader.readAsText(file);
            e.target.value="";
          }}/>
        </label>
      </div>
    </header>
    <main style={{flex:1,overflow:"hidden",padding:10,background:"var(--dark)"}}>
      {page==="map"&&<MapEditor mapItems={data.mapItems} setMapItems={setMapItems} mapImage={data.mapImage} setAppData={setData} sideOpen={sideOpen} setSideOpen={setSideOpen} lore={data.lore} setLore={setLore} onNavigate={navigateToLore}/>}
      {page==="lore"&&<LorePanel lore={data.lore} setLore={setLore} characters={data.characters} initialSel={loreSel} onClearSel={()=>setLoreSel(null)} onNavigate={navigateToLore}/>}
      {page==="chars"&&<CharSheet char={data.characters[charIdx]} onChange={c=>updateChar(charIdx,c)} lore={data.lore} setLore={setLore} onNavigate={navigateToLore}/>}
    </main>

    {/* ── Theme Panel ── */}
    {showTheme&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setShowTheme(false)}>
      <div style={{background:"var(--parch)",border:"2px solid var(--gold2)",borderRadius:10,padding:28,width:500,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 8px 40px rgba(0,0,0,0.6)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <h3 style={{fontFamily:"Cinzel",fontSize:16,color:"var(--gold)",letterSpacing:"0.08em"}}>🎨 Colour Theme</h3>
          <button onClick={()=>setShowTheme(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"var(--ink3)"}}>✕</button>
        </div>
        <div style={{fontSize:9,fontFamily:"Cinzel",color:"var(--ink3)",letterSpacing:"0.08em",marginBottom:8}}>PRESETS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>
          {Object.entries(THEMES).map(([key,t])=>(
            <div key={key} onClick={()=>setThemeKey(key)}
              style={{padding:"10px 14px",borderRadius:6,cursor:"pointer",border:"2px solid "+(themeKey===key?"var(--gold2)":"transparent"),
                background:"linear-gradient(135deg, "+t.dark2+" 0%, "+t.dark2+" 40%, "+t.parch3+" 100%)",
                display:"flex",alignItems:"center",gap:10,transition:"border .15s"}}>
              <div style={{display:"flex",gap:3}}>
                {[t.dark2,t.gold2,t.parch,t.gold3].map((c,i)=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:c,border:"1px solid rgba(255,255,255,0.2)"}}/>)}
              </div>
              <span style={{fontFamily:"Cinzel",fontSize:11,color:themeKey===key?"var(--gold3)":"rgba(255,255,255,0.7)",letterSpacing:"0.04em"}}>{t.name}</span>
              {themeKey===key&&<span style={{marginLeft:"auto",color:"var(--gold3)",fontSize:12}}>✓</span>}
            </div>
          ))}
        </div>
        <div style={{fontSize:9,fontFamily:"Cinzel",color:"var(--ink3)",letterSpacing:"0.08em",marginBottom:10}}>CUSTOM COLOURS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[["dark","App Background"],["dark2","Header Background"],["parch","Panel Background"],["parch2","Sidebar Background"],["gold2","Accent / Borders"],["gold3","Accent Text"],["ink","Main Text"],["ink3","Muted Text"],["sheetHead","Sheet Header"],["sheetBorder","Sheet Borders"],["sheetBg","Sheet Background"]].map(([key,label])=>{
            const cur=(themeKey==="custom"&&customTheme?customTheme:THEMES[themeKey]||THEMES.default)[key]||"#000000";
            return(<div key={key} style={{display:"flex",alignItems:"center",gap:8}}>
              <input type="color" value={cur} onChange={e=>{
                const base=themeKey==="custom"&&customTheme?customTheme:{...(THEMES[themeKey]||THEMES.default)};
                const updated={...base,[key]:e.target.value};
                setCustomTheme(updated);setThemeKey("custom");
                localStorage.setItem("bs_custom_theme",JSON.stringify(updated));
              }} style={{width:32,height:28,border:"1px solid var(--border2)",borderRadius:4,cursor:"pointer",padding:2,background:"transparent"}}/>
              <span style={{fontSize:12,color:"var(--ink2)",fontFamily:"Crimson Pro"}}>{label}</span>
            </div>);
          })}
        </div>
        {themeKey==="custom"&&<button onClick={()=>{setThemeKey("default");setCustomTheme(null);localStorage.removeItem("bs_custom_theme");}} style={{fontFamily:"Cinzel",cursor:"pointer",border:"1px solid var(--border2)",background:"transparent",color:"var(--ink3)",borderRadius:4,padding:"5px 14px",fontSize:11,width:"100%"}}>Reset to Default</button>}
        <p style={{fontSize:11,color:"var(--ink3)",marginTop:12,textAlign:"center",lineHeight:1.6}}>Theme saves in your browser. Each device can have its own theme.</p>
      </div>
    </div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
const _ld=document.getElementById("loading-screen");
if(_ld)setTimeout(()=>{_ld.style.display="none";},100);
</script>
</body>
</html>
